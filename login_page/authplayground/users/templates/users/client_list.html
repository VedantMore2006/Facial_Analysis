<!DOCTYPE html>
<html>
<head>
    <title>Clients</title>
</head>
<body>
    <h2>All Clients</h2>

    <ul>
        {% for client in clients %}
            <li>
                <strong>{{ client.name }}</strong>
                — Counselor: {{ client.counselor.name }}
                |
                <a href="/client/{{ client.id }}/">View</a>
            </li>
        {% endfor %}
    </ul>

    <p><a href="/counselors/">View all counselors</a></p>
</body>
</html>
