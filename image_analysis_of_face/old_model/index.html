<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Consent</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: #1c1c1c;
      padding: 24px;
      border-radius: 8px;
      width: 350px;
    }
    button {
      margin-top: 16px;
      width: 100%;
      padding: 10px;
      background: #4caf50;
      border: none;
      color: black;
      font-size: 16px;
      cursor: pointer;
    }
    button:disabled {
      background: #555;
      cursor: not-allowed;
    }
    video {
      width: 100%;
      margin-top: 16px;
      display: none;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div class="card">
  <h2>User Consent</h2>
  <p>
    This system uses your camera to extract facial movement features.
    No images or videos are stored. Processing is local.
  </p>

  <label>
    <input type="checkbox" id="consentBox">
    I agree to the terms and conditions
  </label>

  <button id="startBtn" disabled>Continue</button>

  <video id="camera" autoplay muted></video>
</div>

<script>
  const consentBox = document.getElementById("consentBox");
  const startBtn = document.getElementById("startBtn");
  const video = document.getElementById("camera");

  consentBox.addEventListener("change", () => {
    startBtn.disabled = !consentBox.checked;
  });

  startBtn.addEventListener("click", async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: true });
      video.srcObject = stream;
      video.style.display = "block";
    } catch (err) {
      alert("Camera access denied.");
    }
  });
</script>

</body>
</html>
